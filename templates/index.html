<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workstation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0e0e0c;
  --bg2:       #141412;
  --bg3:       #1a1a17;
  --border:    #2a2a26;
  --border2:   #333330;
  --ink:       #d4d4cc;
  --ink-muted: #6a6a64;
  --ink-faint: #3a3a36;
  --amber:     #e8a020;
  --amber-dim: #7a4a08;
  --green:     #4caf7a;
  --red:       #e05050;
  --blue:      #5090d0;
  --purple:    #a070c0;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;

  /* event backgrounds (dark-tuned) */
  --think-bg:    #181820;
  --remember-bg: #141a14;
  --reflect-bg:  #1a1420;
  --execute-bg:  #14181e;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  overflow: hidden;
}

/* ── LAYOUT ── */

.shell {
  display: grid;
  grid-template-rows: 38px 1fr;
  grid-template-columns: 1fr 260px 260px;
  height: 100vh;
}

/* ── TOPBAR ── */

.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 2rem;
  padding: 0 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  height: 38px;
  flex-shrink: 0;
}

.logo {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber);
}

.logo-sub {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-left: -1rem;
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}

.status-text {
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
}

.layer-indicator {
  font-size: 9px;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 2px;
}

/* ── MODE TOGGLE ── */

.mode-toggle {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-right: 1rem;
}

.mode-btn {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.mode-btn.active {
  background: var(--ink-faint);
  color: var(--ink);
}

.mode-btn:hover:not(.active) {
  color: var(--ink);
  background: var(--bg3);
}

/* ── MAIN PANEL ── */

.main-panel {
  grid-column: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

/* ── CHAT VIEW ── */

#chat-view {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
}

.conv-area {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.6rem;
  scroll-behavior: smooth;
}

.conv-area::-webkit-scrollbar { width: 3px; }
.conv-area::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── EDITOR VIEW ── */

#editor-view {
  display: none;
  flex-direction: column;
  height: 100%;
  width: 100%;
  background: var(--bg);
}

.editor-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.7rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.editor-title {
  font-size: 10px;
  font-weight: 500;
  color: var(--amber);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.editor-actions {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.editor-btn {
  font-family: var(--mono);
  font-size: 9px;
  background: transparent;
  color: var(--ink-muted);
  border: 1px solid var(--border2);
  padding: 3px 10px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.15s;
  text-decoration: none;
}

.editor-btn:hover {
  background: var(--bg3);
  color: var(--ink);
  border-color: var(--ink-muted);
}

.editor-run-btn {
  font-family: var(--mono);
  font-size: 9px;
  background: var(--green);
  color: var(--bg);
  border: none;
  padding: 4px 12px;
  border-radius: 2px;
  cursor: pointer;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: opacity 0.15s;
  margin-left: 0.5rem;
}

.editor-run-btn:hover { opacity: 0.85; }
.editor-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.code-textarea {
  flex: 1;
  width: 100%;
  background: transparent;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  border: none;
  padding: 1.5rem;
  resize: none;
  outline: none;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
}

.code-textarea::placeholder { color: var(--ink-faint); }

.editor-console {
  height: 35%;
  min-height: 150px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 1rem 1.5rem;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-muted);
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

.editor-console.error { color: var(--red); }


/* ── MESSAGES ── */

.message {
  animation: fadeIn 0.2s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message-meta {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.4rem;
}

.message.human .message-meta { color: var(--amber-dim); }
.message.human .message-prose {
  color: var(--ink-muted);
  font-style: italic;
}

.message-prose {
  font-size: 13px;
  line-height: 1.75;
  color: var(--ink);
  white-space: pre-wrap;
}

/* ── EVENTS ── */

.events {
  margin-top: 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.event {
  font-size: 11px;
  font-weight: 300;
  padding: 0.3rem 0.7rem;
  border-radius: 2px;
  display: flex;
  gap: 0.6rem;
  align-items: flex-start;
  line-height: 1.5;
}

.event-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  min-width: 5rem;
  flex-shrink: 0;
  padding-top: 0.1rem;
}

.event-content { color: var(--ink); word-break: break-word; flex: 1; }

.event.think         { background: var(--think-bg);    }
.event.think         .event-label { color: var(--blue); }
.event.say           { background: var(--bg); border-left: 2px solid var(--border2); }
.event.say           .event-label { color: var(--ink-muted); }
.event.remember      { background: var(--remember-bg); }
.event.remember      .event-label { color: var(--purple); }
.event.forget        { background: var(--think-bg); opacity: 0.6; }
.event.forget        .event-label { color: var(--ink-muted); }
.event.reflect       { background: var(--reflect-bg); }
.event.reflect       .event-label { color: var(--purple); }
.event.execute       { background: var(--execute-bg); }
.event.execute       .event-label { color: var(--blue); }
.event.write_function { background: var(--execute-bg); }
.event.write_function .event-label { color: var(--amber); }
.event.invoke        { background: var(--execute-bg); }
.event.invoke        .event-label { color: var(--green); }
.event.cascade       { background: var(--remember-bg); }
.event.cascade       .event-label { color: var(--purple); }

.event.execute .event-content,
.event.write_function .event-content {
  white-space: pre-wrap;
  font-size: 11px;
}

.exec-result {
  margin-top: 0.3rem;
  padding: 0.3rem 0.5rem;
  background: var(--bg);
  border-radius: 2px;
  color: var(--ink-muted);
  font-size: 11px;
  white-space: pre-wrap;
}
/* ── THINKING INDICATOR ── */

.thinking { display: none; padding: 0.5rem 0; }
.thinking.active { display: block; }

.thinking-dots {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
}

.dot { display: inline-block; animation: pulse 1.4s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* ── WELCOME ── */

.welcome {
  color: var(--ink-faint);
  font-size: 11px;
  font-style: italic;
  line-height: 2;
  letter-spacing: 0.04em;
}

/* ── INPUT AREA ── */

.input-area {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding: 0.8rem 1.5rem 1rem;
}

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 0.6rem;
}

.prompt-glyph {
  color: var(--amber);
  font-size: 14px;
  padding-bottom: 0.2rem;
  user-select: none;
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  min-height: 22px;
  max-height: 180px;
  overflow-y: auto;
}

.chat-input::placeholder { color: var(--ink-faint); }

.input-actions {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-top: 0.6rem;
  padding-left: 1.2rem;
}

.file-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 3px 10px;
  cursor: pointer;
  transition: all 0.12s;
}

.file-label:hover { background: var(--bg3); color: var(--ink); }
.file-label.has-file { background: var(--remember-bg); color: var(--green); border-color: var(--green); }

#file-input { display: none; }

.send-btn {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--amber);
  border: none;
  color: var(--bg);
  padding: 4px 16px;
  border-radius: 3px;
  cursor: pointer;
  transition: opacity 0.15s;
}

.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SIDE PANELS ── */

.side-panel {
  overflow-y: auto;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.side-panel:last-child { border-right: none; }

.side-panel::-webkit-scrollbar { width: 2px; }
.side-panel::-webkit-scrollbar-thumb { background: var(--border2); }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 1;
}

.panel-tab {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  cursor: pointer;
  transition: color 0.15s;
}

.panel-tab:hover { color: var(--ink-muted); }
.panel-tab.active { color: var(--ink); pointer-events: none; }

.panel-count {
  font-size: 9px;
  color: var(--ink-faint);
  background: var(--bg3);
  border-radius: 2px;
  padding: 1px 6px;
}

.panel-body { padding: 0.8rem 1rem; flex: 1; }

.empty { color: var(--ink-faint); font-size: 10px; font-style: italic; }

/* ── MEMORY ITEMS ── */

.mem-item {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
}

.mem-item:last-child { border-bottom: none; }

.mem-key {
  font-size: 10px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.04em;
  display: block;
  margin-bottom: 0.1rem;
}

.mem-value {
  font-size: 10px;
  color: var(--ink-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.item-actions {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.3rem;
}

.icon-btn {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-faint);
  background: none;
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.1s;
  letter-spacing: 0.04em;
}

.icon-btn:hover { color: var(--ink); border-color: var(--border2); }
.icon-btn.del:hover { color: var(--red); border-color: var(--red); }

/* Quick add memory */
.quick-add {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  flex-shrink: 0;
}

.quick-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 2px;
  outline: none;
  width: 100%;
}

.quick-input::placeholder { color: var(--ink-faint); }
.quick-input:focus { border-color: var(--border2); }

.quick-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--ink-muted);
  padding: 3px 10px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.1s;
  align-self: flex-end;
}

.quick-btn:hover { color: var(--ink); }

/* ── FUNCTION ITEMS ── */

.fn-item {
  border-bottom: 1px solid var(--border);
}

.fn-item:last-child { border-bottom: none; }

.fn-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0;
  cursor: pointer;
  user-select: none;
}

.fn-name {
  font-size: 10px;
  font-weight: 500;
  color: var(--amber);
  flex: 1;
  letter-spacing: 0.04em;
  cursor: pointer;
}

.fn-name:hover { color: var(--ink); }

.fn-toggle {
  font-size: 9px;
  color: var(--ink-faint);
  flex-shrink: 0;
}

.fn-actions { display: flex; gap: 0.3rem; }

.fn-code {
  font-size: 10px;
  color: var(--ink-muted);
  white-space: pre-wrap;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.2s ease;
  padding: 0 0 0 0.5rem;
  border-left: 2px solid var(--border);
  margin-bottom: 0;
}

.fn-code.open {
  max-height: 300px;
  margin-bottom: 0.5rem;
}

/* ── INVOKE BAR ── */

.invoke-bar {
  padding: 0.6rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.4rem;
  flex-shrink: 0;
}

.invoke-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 2px;
  outline: none;
}

.invoke-input::placeholder { color: var(--ink-faint); }
.invoke-input:focus { border-color: var(--border2); }

.invoke-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--green);
  padding: 3px 10px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.1s;
}

.invoke-btn:hover { background: var(--green); color: var(--bg); }

/* ── MODALS ── */

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1.5rem;
  width: 420px;
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 1rem;
}

.modal-field { margin-bottom: 0.8rem; }

.modal-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  display: block;
  margin-bottom: 0.3rem;
}

.modal-input, .modal-textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 2px;
  outline: none;
}

.modal-textarea { resize: vertical; min-height: 120px; }
.modal-input:focus, .modal-textarea:focus { border-color: var(--border2); }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.5rem;
  margin-top: 1rem;
}

.modal-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 16px;
  border-radius: 2px;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--ink-muted);
  transition: all 0.12s;
}

.modal-btn:hover { color: var(--ink); }
.modal-btn.primary { background: var(--amber); border-color: var(--amber); color: var(--bg); font-weight: 500; }
.modal-btn.primary:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="logo">Assistant</span>
    <span class="logo-sub">/ workstation</span>
    <div class="topbar-right">
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-chat-btn" onclick="setMode('chat')">chat</button>
        <button class="mode-btn" id="mode-editor-btn" onclick="setMode('editor')">editor</button>
      </div>
      <span class="layer-indicator"></span>
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">connecting</span>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel">
    
    <!-- CHAT VIEW -->
    <div id="chat-view">
      <div class="conv-area" id="conv-area">
        <div class="welcome"></div>
        <div class="thinking" id="thinking">
          <div class="thinking-dots">
            <span class="dot">·</span><span class="dot">·</span><span class="dot">·</span>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <span class="prompt-glyph">›</span>
          <textarea class="chat-input" id="chat-input" rows="1" placeholder="say something…"></textarea>
        </div>
        <div class="input-actions">
          <label class="file-label" id="file-label">
            <input type="file" id="file-input" onchange="handleFileSelect()">
            <span id="file-status">attach</span>
          </label>
          <button class="send-btn" id="send-btn" onclick="send()">send →</button>
        </div>
      </div>
    </div>

    <!-- EDITOR VIEW -->
    <div id="editor-view">
      <div class="editor-header">
        <span class="editor-title" id="editor-title">Scratchpad</span>
        <div class="editor-actions">
          <button class="editor-btn" onclick="openEditorFile()">Open</button>
          <button class="editor-btn" onclick="saveEditorFile()">Save</button>
          <input type="file" id="editor-file-loader" style="display:none;" accept=".py,.txt,.json,.md,text/*" onchange="handleEditorFileLoad()">
          <button class="editor-run-btn" id="editor-run-btn" onclick="runEditorCode()">Run ▶</button>
        </div>
      </div>

          <span class="panel-tab" id="fn-tab-assistant" onclick="setFnView('assistant')">Assistant</span>
        </div>
        <div style="display:flex; gap:0.5rem; align-items:center;">

</div>

<!-- MEMORY MODAL -->
<div class="modal-overlay" id="mem-modal">
  <div class="modal">
    <div class="modal-title">memory</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

// ── Global state ──
const conv    = document.getElementById('conv-area');
const thinking = document.getElementById('thinking');

let wsMemories         = {};
let wsFunctions        = {};
let assistantMemories  = {};
let assistantFunctions = {};
let viewMem = 'ws';
let viewFn  = 'ws';


let editingFn    = null;
let embedder     = null;
let currentFileHandle = null;


// ── Embedder (for cascade search) ──
async function initEmbedder() {
  try {
    const { env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0');
    env.allowLocalModels = false;
    env.useBrowserCache = true;
    embedder = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-mpnet-base-v2');
    console.log('✓ Embedder ready');
  } catch (err) {
    console.warn('Embedder unavailable:', err);
  }
}

async function embed(text) {
  if (!embedder) return null;
  const out = await embedder(text, { pooling: 'mean', normalize: true });
  return Array.from(out.data);
}

async function storeMessageEmbedding(messageId, content) {
  if (!embedder) return;
  const embedding = await embed(content);
  if (!embedding) return;
  await fetch('/api/embed', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ table: 'conversation', key: messageId, embedding })
  }).catch(() => {});
}

async function storeMemoryEmbedding(key, value) {
  if (!embedder) return;
  const embedding = await embed(value);
  if (!embedding) return;
  await fetch('/api/embed', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ table: 'memory', key, embedding })
  }).catch(() => {});
}

async function handleCascade(query) {
  if (!embedder) return [];
  const queryEmbedding = await embed(query);
  if (!queryEmbedding) return [];
  try {
    const res = await fetch('/api/cascade', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ embedding: queryEmbedding, limit: 10, threshold: 0.3 })
    });
    const data = await res.json();
    return data.results || [];
  } catch { return []; }
}

// ── Helpers ──
function ts() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function isError(str) {
  return /^(Error|SyntaxError|ImportError|TypeError|ValueError|NameError|\w+Error):/.test(str);
}

// ── UI TOGGLES & EDITOR FILE OPERATIONS ──
window.setMode = function(mode) {
  const chatView = document.getElementById('chat-view');
  const editorView = document.getElementById('editor-view');
  
  const chatBtn = document.getElementById('mode-chat-btn');
  const editorBtn = document.getElementById('mode-editor-btn');

  chatView.style.display = 'none';
  editorView.style.display = 'none';
  
  chatBtn.classList.remove('active');
  editorBtn.classList.remove('active');

  if (mode === 'chat') {
    chatView.style.display = 'flex';
    chatBtn.classList.add('active');
    conv.scrollTop = conv.scrollHeight;
    document.getElementById('chat-input').focus();
  } else if (mode === 'editor') {
    editorView.style.display = 'flex';
    editorBtn.classList.add('active');
    document.getElementById('main-code-editor').focus();
  }
};





window.openEditorFile = function() {
  document.getElementById('editor-file-loader').click();
};

window.handleEditorFileLoad = function() {
  const fi = document.getElementById('editor-file-loader');
  if (fi.files.length > 0) {
    const file = fi.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('main-code-editor').value = e.target.result;
      document.getElementById('editor-title').textContent = file.name;
      currentFileHandle = null; 
    };
    reader.readAsText(file);
  }
  fi.value = ''; 
};

window.saveEditorFile = async function() {
  const code = document.getElementById('main-code-editor').value;
  const currentTitle = document.getElementById('editor-title').textContent;
  const defaultName = currentTitle === 'Scratchpad' ? 'scratchpad.py' : currentTitle;

  try {
    if ('showSaveFilePicker' in window) {
      if (!currentFileHandle) {
        currentFileHandle = await window.showSaveFilePicker({
          suggestedName: defaultName,
          types: [{
            description: 'Python File',
            accept: {'text/x-python': ['.py']}
          }, {
            description: 'Text File',
            accept: {'text/plain': ['.txt', '.md', '.json']}
          }]
        });
      }
      const writable = await currentFileHandle.createWritable();
      await writable.write(code);
      await writable.close();
      document.getElementById('editor-title').textContent = currentFileHandle.name;
    } else {
      const blob = new Blob([code], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = defaultName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error('Failed to save file:', err);
      alert('Failed to save file.');
    }
  }
};

window.runEditorCode = async function() {
  const code = document.getElementById('main-code-editor').value.trim();
  const consoleEl = document.getElementById('editor-console');
  const runBtn = document.getElementById('editor-run-btn');

  if (!code) return;

  runBtn.disabled = true;
  runBtn.textContent = 'RUNNING...';
  consoleEl.innerHTML = '<span style="color:var(--ink-faint);">executing...</span>';
  consoleEl.classList.remove('error');

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();

    if (data.error) {
      consoleEl.textContent = data.error;
      consoleEl.classList.add('error');
    } else {
      consoleEl.textContent = data.result || '(executed — no output)';
      if (isError(data.result)) {
        consoleEl.classList.add('error');
      }
    }
    
    await loadState();
  } catch (err) {
    consoleEl.textContent = 'Network or server error executing code.';
    consoleEl.classList.add('error');
  }

  runBtn.disabled = false;
  runBtn.textContent = 'RUN ▶';
};

document.getElementById('main-code-editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
  }
});


// ── SEND ──
window.send = async function() {
  const input     = document.getElementById('chat-input');
  const fileInput = document.getElementById('file-input');
  const btn       = document.getElementById('send-btn');
  const message   = input.value.trim();

  if (!message && !fileInput.files[0]) return;

  input.value = '';
  autoResize(input);
  btn.disabled = true;

  addMessage('human', message || '(sent a file)', null);
  thinking.classList.add('active');
  conv.scrollTop = conv.scrollHeight;

  try {
    const formData = new FormData();
    formData.append('message', message);
    if (fileInput.files[0]) formData.append('file', fileInput.files[0]);

    const res  = await fetch('/api/chat', { method: 'POST', body: formData });
    const data = await res.json();
    thinking.classList.remove('active');

    if (message && data.user_message_id)
      storeMessageEmbedding(data.user_message_id, message);
    if (data.assistant_message_id && data.raw)
      storeMessageEmbedding(data.assistant_message_id, data.raw);

    fileInput.value = '';
    document.getElementById('file-label').classList.remove('has-file');
    document.getElementById('file-status').textContent = 'attach';

    const eventsHtml = await processEvents(data.events || []);
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.innerHTML = `
      <div class="message-meta">assistant · ${ts()}</div>
      ${data.prose ? `<div class="message-prose">${esc(data.prose)}</div>` : ''}
      ${eventsHtml ? `<div class="events">${eventsHtml}</div>` : ''}
    `;
    conv.insertBefore(msg, thinking);
    conv.scrollTop = conv.scrollHeight;

    for (const e of data.events || []) {
      if (e.type === 'remember') storeMemoryEmbedding(e.key, e.value).catch(() => {});
    }

    await loadState();

  } catch (err) {
    thinking.classList.remove('active');
    addMessage('assistant', '(something went wrong)', null);
    console.error(err);
  }

  btn.disabled = false;
  input.focus();
};

// ── ADD MESSAGE ──
function addMessage(who, prose, events) {
  const welcome = conv.querySelector('.welcome');
  if (welcome) welcome.remove();

  const msg = document.createElement('div');
  msg.className = `message ${who}`;
  msg.innerHTML = `
    <div class="message-meta">${who === 'human' ? 'you' : 'assistant'} · ${ts()}</div>
    ${prose ? `<div class="message-prose">${esc(prose)}</div>` : ''}
  `;
  conv.insertBefore(msg, thinking);
  conv.scrollTop = conv.scrollHeight;
}

// ── RENDER EVENTS ──
async function renderEvent(e) {
  const label = `<span class="event-label">${esc(e.type)}</span>`;
  let content = '';

  switch (e.type) {
    case 'think':   content = esc(e.content); break;
    case 'reflect': content = esc(e.content); break;
    case 'say':     content = `"${esc(e.content)}"`; break;
    case 'forget':  content = esc(e.key); break;
    case 'remember': content = `${esc(e.key)} = ${esc(e.value)}`; break;

    case 'emote':
      content = esc(e.content);
      break;

    case 'cascade': {
      const results = await handleCascade(e.query);
      if (results.length) {
        content = `<div style="margin-bottom:0.4rem;font-weight:500;">${esc(e.query)}</div>`;
        content += results.map(r =>
          `<div style="margin:0.25rem 0;padding:0.35rem 0.5rem;background:var(--bg);border-radius:2px;font-size:10px;">
            <div style="font-size:9px;color:var(--ink-faint);margin-bottom:0.15rem;text-transform:uppercase;letter-spacing:0.06em;">${r.source} · ${(r.similarity*100).toFixed(0)}%</div>
            <div style="color:var(--ink-muted);">${esc(r.content)}</div>
          </div>`
        ).join('');
      } else {
        content = `${esc(e.query)} → <span style="color:var(--ink-faint);">(no results)</span>`;
      }
      break;
    }

    case 'execute':
      content = `<pre style="margin:0">${esc(e.code)}</pre><div class="exec-result">${esc(e.result || '')}</div>`;
      break;

    case 'write_function':
      content = `<strong style="color:var(--amber);">${esc(e.name)}</strong><pre style="margin:0.3rem 0 0">${esc(e.code)}</pre>`;
      break;

    case 'invoke':
      content = `<strong style="color:var(--green);">${esc(e.call)}</strong><div class="exec-result">${esc(e.result || '')}</div>`;
      break;

    default: content = esc(JSON.stringify(e));
  }

  return `<div class="event ${e.type}">${label}<span class="event-content">${content}</span></div>`;
}

async function processEvents(events) {
  const parts = [];
  for (const e of events) parts.push(await renderEvent(e));
  return parts.join('');
}


// ── FILE INPUT ──
window.handleFileSelect = function() {
  const fi = document.getElementById('file-input');
  const label = document.getElementById('file-label');
  const status = document.getElementById('file-status');
  if (fi.files.length > 0) {
    const name = fi.files[0].name;
    label.classList.add('has-file');
    status.textContent = name.length > 10 ? name.substring(0, 8) + '..' : name;
  } else {
    label.classList.remove('has-file');
    status.textContent = 'attach';
  }
};

// ── INVOKE (workstation direct execution) ──
window.invokeFn = async function() {
  const call = document.getElementById('invoke-input').value.trim();
  if (!call) return;
  document.getElementById('invoke-input').value = '';

  try {
    const res  = await fetch('/api/invoke', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ call })
    });
    const data = await res.json();
    const result = data.result || '';
    const isErr  = isError(result);
    const msg = document.createElement('div');
    msg.className = 'message';
    msg.innerHTML = `
      <div class="message-meta">invoke · ${ts()}</div>
      <div class="events">
        <div class="event invoke">
          <span class="event-label">invoke</span>
          <span class="event-content">
            <strong style="color:var(--green);">${esc(call)}</strong>
            <div class="exec-result" style="${isErr ? 'color:var(--red);' : ''}">${esc(result)}</div>
          </span>
        </div>
      </div>
    `;
    setMode('chat');
    conv.insertBefore(msg, thinking);
    conv.scrollTop = conv.scrollHeight;
  } catch (err) {
    console.error(err);
  }
};

window.fillInvoke = function(name) {
  const inp = document.getElementById('invoke-input');
  inp.value = `${name}()`;
  inp.focus();
  const pos = inp.value.length - 1;
  inp.setSelectionRange(pos, pos);
};

window.setMemView = function(view) {
  viewMem = view;
  document.getElementById('mem-tab-ws').classList.toggle('active', view === 'ws');
  document.getElementById('mem-tab-assistant').classList.toggle('active', view === 'assistant');
  document.getElementById('mem-quick-add').style.display = view === 'ws' ? 'flex' : 'none';
  renderMemory(document.getElementById('mem-search').value);
};

window.setFnView = function(view) {
  viewFn = view;
  document.getElementById('fn-tab-ws').classList.toggle('active', view === 'ws');
  document.getElementById('fn-tab-assistant').classList.toggle('active', view === 'assistant');
  document.getElementById('fn-quick-add').style.display = view === 'ws' ? 'block' : 'none';
  document.getElementById('invoke-bar').style.display = view === 'ws' ? 'flex' : 'none';
  renderFunctions();
};


// ── STATE LOADER ──
async function loadState() {
  try {
    const [resWs, resAssistant] = await Promise.all([
      fetch('/api/state'),
      fetch('/api/assistant/state')
    ]);

    const dataWs        = await resWs.json();
    const dataAssistant = await resAssistant.json();

    wsMemories         = dataWs.memories || {};
    wsFunctions        = dataWs.functions || {};
    assistantMemories  = dataAssistant.memories || {};
    assistantFunctions = dataAssistant.functions || {};

    renderMemory(document.getElementById('mem-search').value);
    renderFunctions();

    document.getElementById('status-dot').style.background  = 'var(--green)';
    document.getElementById('status-text').textContent = 'connected';
  } catch {
    document.getElementById('status-dot').style.background  = 'var(--red)';
    document.getElementById('status-text').textContent = 'offline';
  }
}

// ── RENDER MEMORY ──
function renderMemory(filter) {
  const activeMem = viewMem === 'ws' ? wsMemories : assistantMemories;
  const list = document.getElementById('mem-list');
  const keys = Object.keys(activeMem).filter(k =>
    !filter || k.toLowerCase().includes(filter.toLowerCase()) ||
    activeMem[k].toLowerCase().includes(filter.toLowerCase())
  );
  
  document.getElementById('mem-count').textContent = Object.keys(activeMem).length;

  if (!keys.length) {
    list.innerHTML = '<div class="empty">nothing here yet</div>';
    return;
  }
  
  list.innerHTML = keys.map(k => `
    <div class="mem-item">
      <span class="mem-key">${esc(k)}</span>
      <span class="mem-value">${esc(activeMem[k])}</span>
      <div class="item-actions">
        <button class="icon-btn" onclick="editMem('${esc(k)}')">edit</button>
        <button class="icon-btn del" onclick="deleteMem('${esc(k)}')">del</button>
      </div>
    </div>
  `).join('');
}

window.filterMemory = function(v) { renderMemory(v); };

// ── RENDER FUNCTIONS ──
function renderFunctions() {
  const activeFn = viewFn === 'ws' ? wsFunctions : assistantFunctions;
  const list = document.getElementById('fn-list');
  const names = Object.keys(activeFn);
  
  document.getElementById('fn-count').textContent = names.length;

  if (!names.length) {
    list.innerHTML = '<div class="empty">no functions saved</div>';
    return;
  }
  
  list.innerHTML = names.map(function(n) {
    var isWs    = viewFn === 'ws';
    var nameAttr = isWs
      ? 'title="click to invoke" onclick="event.stopPropagation(); fillInvoke(\'' + esc(n) + '\')"'
      : '';
    var actions = isWs
      ? '<div class="fn-actions">'
          + '<button class="icon-btn" onclick="event.stopPropagation(); editFn(\'' + esc(n) + '\')">edit</button>'
          + '<button class="icon-btn del" onclick="event.stopPropagation(); deleteFn(\'' + esc(n) + '\')">del</button>'
          + '</div>'
      : '';
    return '<div class="fn-item">'
      + '<div class="fn-header" onclick="toggleFn(this)">'
      + '<span class="fn-name" ' + nameAttr + '>' + esc(n) + '</span>'
      + actions
      + '<span class="fn-toggle">&#9658;</span>'
      + '</div>'
      + '<div class="fn-code">' + esc(activeFn[n]) + '</div>'
      + '</div>';
  }).join('');
}

window.toggleFn = function(header) {
  const code = header.nextElementSibling;
  const tog  = header.querySelector('.fn-toggle');
  code.classList.toggle('open');
  tog.textContent = code.classList.contains('open') ? '▾' : '▸';
};

// ── MEMORY ACTIONS ──
window.editMem = function(key) { openMemModal(key, wsMemories[key]); };

function openMemModal(key, value) {
  document.getElementById('mem-modal-key').value = key || '';
  document.getElementById('mem-modal-val').value = value || '';
  document.getElementById('mem-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('mem-modal-key').focus(), 50);
}

window.saveMemory = async function() {
  const key   = document.getElementById('mem-modal-key').value.trim();
  const value = document.getElementById('mem-modal-val').value.trim();
  if (!key || !value) return;
  await fetch('/api/memory', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key, value })
  });
  closeModal('mem-modal');
  await loadState();
};

window.deleteMem = async function(key) {
  await fetch(`/api/memory/${encodeURIComponent(key)}`, { method: 'DELETE' });
  await loadState();
};

window.quickSet = async function() {
  const key   = document.getElementById('quick-key').value.trim();
  const value = document.getElementById('quick-val').value.trim();
  if (!key || !value) return;
  await fetch('/api/memory', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key, value })
  });
  document.getElementById('quick-key').value  = '';
  document.getElementById('quick-val').value  = '';
  await loadState();
};

// ── FUNCTION ACTIONS ──
window.editFn = function(name) { openFnModal(name, wsFunctions[name]); };
window.newFn  = function() { openFnModal(); };

function openFnModal(name, code) {
  editingFn = name || null;
  document.getElementById('fn-modal-title').textContent = name ? `edit: ${name}` : 'new function';
  document.getElementById('fn-modal-name').value = name || '';
  document.getElementById('fn-modal-code').value = code || '';
  document.getElementById('fn-modal').style.display = 'flex';
  setTimeout(() => {
    const t = name ? document.getElementById('fn-modal-code') : document.getElementById('fn-modal-name');
    t.focus();
  }, 50);
}

window.saveFn = async function() {
  const name = document.getElementById('fn-modal-name').value.trim();
  const code = document.getElementById('fn-modal-code').value.trim();
  if (!name || !code) return;
  await fetch('/api/functions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, code })
  });
  closeModal('fn-modal');
  await loadState();
};

window.deleteFn = async function(name) {
  await fetch(`/api/functions/${encodeURIComponent(name)}`, { method: 'DELETE' });
  await loadState();
};

// ── MODALS ──
window.closeModal = function(id) {
  document.getElementById(id).style.display = 'none';
};

document.addEventListener('keydown', e => {
  if (e.key === 'Escape')
    document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
});

// ── INPUT AUTO-RESIZE ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

document.getElementById('chat-input').addEventListener('input', function() {
  autoResize(this);
});

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// ── INIT ──
window.addEventListener('load', () => {
  document.getElementById('chat-input').focus();
  loadState();
});

setInterval(loadState, 15000);
</script>
</body>
</html>
